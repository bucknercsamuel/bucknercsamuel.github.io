# Builds the image locally from the included Dockerfile so the gem set
# matches this repo's Gemfile (the prebuilt Docker Hub image lags behind).
services:
  jekyll:
    build: .
    ports:
      - 8080:8080
      - 35729:35729
    volumes:
      - .:/srv/jekyll
    environment:
      - JEKYLL_ENV=development
